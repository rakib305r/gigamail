<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sylhet Polytechnic Institute</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      text-align: center;
      padding: 40px;
    }

    header {
      padding: 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.5rem;
    }

    header p {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    /* Button */
    .btn {
      padding: 12px 25px;
      font-size: 16px;
      background: #ff9800;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
      color: #fff;
      transition: 0.3s;
    }

    .btn:hover {
      background: #e68900;
    }

    /* Popup Styles */
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: #fff;
      color: #333;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      text-align: left;
      animation: fadeIn 0.3s ease-in-out;
    }

    .popup-content h2 {
      margin-bottom: 15px;
      text-align: center;
      color: #2a5298;
    }

    .popup-content input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .popup-content button {
      width: 100%;
      padding: 12px;
      background: #2a5298;
      border: none;
      color: #fff;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .popup-content button:hover {
      background: #1e3c72;
    }

    .close {
      float: right;
      font-size: 20px;
      cursor: pointer;
      color: red;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: scale(0.9);}
      to {opacity: 1; transform: scale(1);}
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to Sylhet Polytechnic Institute</h1>
    <p>Empowering Students with Skills & Knowledge</p>
  </header>

  <button class="btn" onclick="openPopup()">Sign Up</button>

  
  <div class="popup" id="popupForm">
    <div class="popup-content">
      <span class="close" onclick="closePopup()">&times;</span>
      <h2>Sign Up</h2>
      <form>
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email" required>
        <input type="text" placeholder="Student ID" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Register</button>
      </form>
    </div>
  </div>

  <script>
    function openPopup() {
      document.getElementById("popupForm").style.display = "flex";
    }
    function closePopup() {
      document.getElementById("popupForm").style.display = "none";
    }
  </script>
</body>
</html>
